name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check style and lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan dependencies for vulnerabilities
        run: pip-audit -r requirements.txt

  test:
    runs-on: ubuntu-latest

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?connect_timeout=10
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify PostgreSQL connection
        run: python -c "import psycopg2; conn = psycopg2.connect('$TEST_DATABASE_URL'); print('PostgreSQL connection OK'); conn.close()"

      - name: Verify SQLAlchemy can create tables
        run: |
          python -c "
          from app import create_app
          from app.extensions import db
          from app.config import TestingConfig
          print('Creating app...')
          app = create_app(TestingConfig)
          with app.app_context():
              print('Running create_all...')
              db.create_all()
              print('Tables created OK')
              db.drop_all()
              print('Tables dropped OK')
          "

      - name: Run tests
        run: pytest -v --timeout=30
